<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Free Board</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="main-header">
  <div class="logo-container">
    <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" class="header-logo">
      <defs>
        <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6E4CFF"/>
          <stop offset="100%" stop-color="#5D3FD3"/>
        </linearGradient>
      </defs>
      <rect x="10" y="15" rx="16" ry="16" width="60" height="45" fill="url(#gradPurple)"/>
      <polygon points="35,60 48,60 36,70" fill="#5D3FD3"/>
      <rect x="22" y="28" width="36" height="5" rx="2.5" fill="white"/>
      <rect x="22" y="38" width="28" height="5" rx="2.5" fill="white"/>
      <rect x="22" y="48" width="18" height="5" rx="2.5" fill="white"/>
      <text x="90" y="48"
            font-family="Segoe UI, Helvetica, Arial, sans-serif"
            font-size="28"
            font-weight="700"
            fill="#5D3FD3">
        Free Board
      </text>
    </svg>
  </div>
  <button class="rule-btn" onclick="openRuleModal()">RULE</button>
</header>

<main class="app-container">
  <div id="auth" class="auth-overlay">
    <div class="auth-card" id="authCard">
      <h2>Free Board</h2>
      <p>合言葉を入力して入室してください</p>
      <input id="passInput" type="password" placeholder="Passcode">
      <p id="authError" class="auth-error-msg">合言葉が違います</p>
      <button onclick="login()" class="primary-btn">入室</button>
    </div>
  </div>

  <div id="app" class="app-layout" style="display:none;">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="label">BOARDS</span>
        <button onclick="toggleBoardForm()" class="add-btn" id="addBoardToggle">+</button>
      </div>

      <div id="newBoardForm" class="board-create-box">
        <div class="form-row">
          <input id="newBoardTitle" placeholder="ボード名を入力...">
          <button onclick="createNewBoard()" class="create-confirm-btn">作成</button>
        </div>
      </div>

      <nav id="boardList" class="board-nav">
        </nav>
    </aside>

    <section class="chat-view">
      <div class="chat-top-bar">
        <h2 id="currentBoardTitle">ボードを選択</h2>
      </div>

      <div id="messages" class="message-scroller">
        <div class="loading-msg">読み込み中...</div>
      </div>

      <div class="chat-controls">
        <div class="user-profile-bar">
          <div class="nick-input-group">
            <span class="user-icon">👤</span>
            <input id="nickname" placeholder="ニックネーム" maxlength="15">
          </div>
        </div>
        <div class="text-input-group">
          <textarea id="content" placeholder="メッセージを入力..." rows="1"></textarea>
          <button onclick="send()" id="sendBtn" class="icon-send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
          </button>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="ruleModal" class="rule-modal">
  <div class="rule-content">
    <div class="rule-header">
      <h2>掲示板ルール</h2>
      <span class="rule-close" onclick="closeRuleModal()">×</span>
    </div>
    <div class="rule-body">
      <ol>
        <li>誹謗中傷は禁止です。</li>
        <li>個人情報の投稿は禁止です。</li>
        <li>宣伝・勧誘行為は禁止です。</li>
        <li>荒らし行為は禁止です。</li>
        <li>運営の判断で投稿を削除する場合があります。</li>
        <li>楽しく、節度を持って利用してください。</li>
      </ol>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
